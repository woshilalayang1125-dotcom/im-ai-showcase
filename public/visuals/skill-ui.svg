  <g font-family="Microsoft YaHei,Arial">
    <rect x="64" y="130" width="330" height="460" rx="14" fill="#fff" stroke="#dfe5ee"/>
    <rect x="434" y="130" width="330" height="460" rx="14" fill="#fff" stroke="#dfe5ee"/>
    <rect x="804" y="130" width="330" height="460" rx="14" fill="#fff" stroke="#dfe5ee"/>
    <text x="94" y="190" font-size="24" font-weight="700" fill="#005bbb">Ic Investment Memo Sop</text>
    <text x="464" y="190" font-size="24" font-weight="700" fill="#005bbb">CATL Codex PPT</text>
    <text x="834" y="190" font-size="24" font-weight="700" fill="#005bbb">Image2PPT</text>
    <text x="94" y="250" font-size="18" fill="#344054">把投资逻辑和 datapack</text><text x="94" y="282" font-size="18" fill="#344054">转成 PPT 图片生成指导文件</text>
