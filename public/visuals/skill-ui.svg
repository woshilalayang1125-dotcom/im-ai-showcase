    <text x="834" y="250" font-size="18" fill="#344054">把排序图片高清组装为</text><text x="834" y="282" font-size="18" fill="#344054">16:9 贴图版 PPT</text>
    <rect x="94" y="350" width="250" height="70" rx="8" fill="#eaf3ff"/><text x="116" y="394" font-size="17" fill="#005bbb">输入：PDF / datapack</text>
    <rect x="464" y="350" width="250" height="70" rx="8" fill="#eaf3ff"/><text x="486" y="394" font-size="17" fill="#005bbb">输入：生成指导文件</text>
