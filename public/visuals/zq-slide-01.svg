<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#ffffff"/>
  <rect x="0" y="0" width="1200" height="78" fill="#005bbb"/>
  <text x="46" y="50" font-family="Microsoft YaHei,Arial" font-size="28" font-weight="700" fill="#fff">子虔科技：从 CAD 工具到设计 Copilot 的投资逻辑</text>
  <g font-family="Microsoft YaHei,Arial">
    <text x="60" y="145" font-size="34" font-weight="700" fill="#111827">核心判断</text>
    <text x="60" y="200" font-size="22" fill="#344054">AI 正在把设计软件从“绘图效率工具”推向“工程知识与方案生成入口”。</text>
    <rect x="60" y="260" width="320" height="250" rx="10" fill="#eaf3ff"/><text x="90" y="315" font-size="22" font-weight="700" fill="#005bbb">需求侧</text><text x="90" y="365" font-size="18" fill="#344054">设计提效、知识复用、方案迭代</text>
    <rect x="440" y="260" width="320" height="250" rx="10" fill="#f8fafc" stroke="#dfe5ee"/><text x="470" y="315" font-size="22" font-weight="700" fill="#005bbb">供给侧</text><text x="470" y="365" font-size="18" fill="#344054">多模态模型 + CAD 插件化能力</text>
    <rect x="820" y="260" width="320" height="250" rx="10" fill="#ecfdf3"/><text x="850" y="315" font-size="22" font-weight="700" fill="#027a48">投资意义</text><text x="850" y="365" font-size="18" fill="#344054">有机会形成设计工作流入口</text>
  </g>
</svg>
